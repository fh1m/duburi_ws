[develop]
script_dir=$base/lib/duburi_sensors
[install]
install_scripts=$base/lib/duburi_sensors

[flake8]
max-line-length = 100
extend-ignore =
    E126,
    E128,
    E221,
    E241,
    E261,
    E266,
    E271,
    E272,
    E501,
    W503
exclude =
    build,
    dist,
    install,
    log,
    .git
