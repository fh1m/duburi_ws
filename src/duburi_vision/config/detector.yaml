# duburi_vision -- detector defaults
#
# Custom gate models (src/duburi_vision/models/ -- no .yaml sidecar needed):
#   gate_nano_100ep    ~5 MB   fastest -- class 'gate', 100 epochs (default)
#   gate_medium_100ep ~42 MB   more accurate -- class 'gate', 100 epochs
#
# Switch model at launch: ros2 launch ... model:=gate_medium_100ep
# Or live: ros2 param set /duburi_detector model_path gate_medium_100ep
#
# Pretrained YOLO26 (auto-download):
#   yolo26_nano_pretrained, yolo26_small_pretrained, etc.
#
# device:  cuda:N -> require GPU. cpu -> explicit CPU. auto -> GPU if present.
# half:    FP16 inference (off by default; enable for Jetson Orin).
# classes: CSV class names. 'gate' for gate models. '' = all classes.

duburi_detector:
  ros__parameters:
    model_path:          gate_nano_100ep
    device:              cuda:0
    half:                false
    conf:                0.30
    iou:                 0.50
    imgsz:               640
    classes:             gate
    publish_debug_image: true
    debug_image_hz:      5.0
    alignment_deadband:  0.05
